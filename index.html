<title>WorldFirst Posting Schedule</title>
<style>
:root { --bg:#fafaf9; --surface:#fff; --border:#e7e5e4; --text:#1c1917; --text-dim:#57534e; --text-faint:#a8a29e; --green:#15803d; --orange:#c2410c; }
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Text', sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
.container { max-width: 820px; margin: 0 auto; padding: 64px 32px 96px; }
h1 { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; }
.lede { font-size: 17px; color: var(--text-dim); margin: 0 0 48px; max-width: 640px; }
h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 64px 0 16px; padding-top: 32px; border-top: 1px solid var(--border); }
h2:first-of-type { border-top: 0; padding-top: 0; }
h3 { font-size: 16px; font-weight: 600; margin: 32px 0 8px; }
p { margin: 0 0 16px; }
ul, ol { margin: 0 0 16px; padding-left: 20px; }
li { margin-bottom: 6px; }
code { font-family: 'SF Mono', Menlo, monospace; font-size: 13px; background: #f3f1ee; padding: 1px 6px; border-radius: 3px; color: #44403c; }
a { color: #1c1917; text-decoration: underline; text-decoration-color: #d6d3d1; text-underline-offset: 2px; }
a:hover { text-decoration-color: #1c1917; }
table { width: 100%; border-collapse: collapse; margin: 16px 0 24px; font-size: 14px; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { font-weight: 600; color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
.meta-row { color: var(--text-faint); font-size: 13px; margin-bottom: 32px; }
.meta-row span:not(:last-child)::after { content: ' · '; }
.callout { border-left: 2px solid var(--text); background: #f7f7f6; padding: 12px 16px; margin: 16px 0 24px; font-size: 14px; }
footer { color: var(--text-faint); font-size: 12px; margin-top: 80px; }

body.locked .container { filter: blur(20px); pointer-events: none; }
#gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(250,250,249,0.96); backdrop-filter: blur(8px); z-index: 100; }
#gate-card { width: 340px; padding: 32px 28px; background: #fff; border: 1px solid var(--border); border-radius: 8px; }
#gate-card h2 { margin: 0 0 4px; font-size: 18px; font-weight: 600; padding-top: 0; border-top: 0; }
#gate-card p { margin: 0 0 20px; font-size: 13px; color: var(--text-dim); }
#gate-form { display: flex; gap: 8px; }
#gate-input { flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px; font-size: 14px; font-family: inherit; outline: none; }
#gate-input:focus { border-color: #1c1917; }
#gate-btn { padding: 9px 16px; background: #1c1917; color: #fafaf9; border: 0; border-radius: 5px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
#gate-err { color: #b91c1c; font-size: 12px; margin-top: 12px; min-height: 16px; }
.lock-link { color: #a8a29e; font-size: 11px; text-decoration: none; }
.lock-link:hover { color: #1c1917; }
</style>
</head>

<script>
function b64ToBytes(b64) { const bin = atob(b64); const bytes = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i); return bytes; }
async function deriveKey(p, s, it) { const enc = new TextEncoder(); const baseKey = await crypto.subtle.importKey("raw", enc.encode(p), "PBKDF2", false, ["deriveKey"]); return crypto.subtle.deriveKey({ name: "PBKDF2", salt: s, iterations: it, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]); }
async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt); const iv = b64ToBytes(blob.iv); const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}
async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input'); const err = document.getElementById('gate-err'); err.textContent = '';
  try {
    const innerHtml = await decryptPayload(inp.value);
    document.getElementById('content').innerHTML = innerHtml + '<div style="text-align:center;margin:48px 0;font-size:11px;"><a class="lock-link" href="#" onclick="localStorage.removeItem(\'posting_schedule_pw\');location.reload();return false;">lock device</a></div>';
    document.getElementById('content').hidden = false;
    document.getElementById('gate').style.display = 'none';
    document.body.classList.remove('locked');
    try { localStorage.setItem('posting_schedule_pw', inp.value); } catch (_) {}
  } catch (ex) { err.textContent = 'wrong password'; inp.value = ''; inp.focus(); }
  return false;
}
(async () => {
  try {
    const cached = localStorage.getItem('posting_schedule_pw');
    if (cached) {
      const innerHtml = await decryptPayload(cached);
      document.getElementById('content').innerHTML = innerHtml + '<div style="text-align:center;margin:48px 0;font-size:11px;"><a class="lock-link" href="#" onclick="localStorage.removeItem(\'posting_schedule_pw\');location.reload();return false;">lock device</a></div>';
      document.getElementById('content').hidden = false;
      document.getElementById('gate').style.display = 'none';
      document.body.classList.remove('locked');
    }
  } catch (_) { try { localStorage.removeItem('posting_schedule_pw'); } catch (_) {} }
})();
</script>
