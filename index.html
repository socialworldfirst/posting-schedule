<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst Posting Schedule — Research Report</title>
<style>

  :root {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --panel-soft: #fafafb;
    --panel-tint: #f0f0f3;

    --ink: #1d1d1f;
    --ink-2: #424245;
    --ink-3: #6e6e73;
    --ink-4: #86868b;
    --ink-5: #a1a1a6;

    --line: #e5e5ea;
    --line-soft: #ececef;
    --line-strong: #d2d2d7;

    --accent: #0071e3;
    --accent-tint: #e3eeff;

    --sidebar-w: 244px;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: #ffe066; }

  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

  aside.sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 22px 18px 18px;
  }
  @media (max-width: 880px) {
    aside.sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 16px 18px; }
  }
  .brand { padding: 0 6px 18px; border-bottom: 1px solid var(--line-soft); margin-bottom: 18px; }
  .brand small { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin-bottom: 4px; }
  .brand strong { display: block; font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
  .nav-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; padding: 14px 6px 8px; }
  .nav-label:first-of-type { padding-top: 0; }
  nav.toc { display: flex; flex-direction: column; gap: 1px; }
  nav.toc a {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px;
    color: var(--ink-3); text-decoration: none; font-size: 13px;
    transition: background .12s ease, color .12s ease;
    line-height: 1.3;
  }
  nav.toc a:hover { background: var(--panel-tint); color: var(--ink); }
  nav.toc a.active { background: var(--accent-tint); color: var(--accent); }
  nav.toc a.active .num { color: var(--accent); }
  nav.toc a .num { font-size: 11px; color: var(--ink-5); font-variant-numeric: tabular-nums; font-weight: 600; width: 18px; flex-shrink: 0; }
  .sidebar-foot { margin-top: auto; padding: 14px 6px 0; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--ink-5); line-height: 1.5; }

  main.main { padding: 32px 56px 80px; max-width: 1200px; width: 100%; }
  @media (max-width: 720px) { main.main { padding: 24px 20px 64px; } }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 14px; margin-bottom: 24px;
    border-bottom: 1px solid var(--line);
    font-size: 12px; color: var(--ink-4);
  }
  .crumbs span { color: var(--ink-3); }
  .crumbs span + span::before { content: " / "; color: var(--ink-5); }
  .meta-pills { display: flex; gap: 8px; }
  .meta-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 3px 8px; font-size: 11px; color: var(--ink-3); }
  .meta-pill b { color: var(--ink); font-weight: 600; }

  .hero {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 28px 32px; margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .hero h1 { font-size: 30px; line-height: 1.15; letter-spacing: -0.02em; font-weight: 600; margin: 0 0 8px; }
  .hero p.lede { font-size: 14.5px; color: var(--ink-3); margin: 0 0 20px; max-width: 680px; }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 12px 14px; }
  .stat b { display: block; font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1.1; letter-spacing: -0.015em; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
  .stat span { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

  section.panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 24px 28px 28px; margin-bottom: 18px;
    box-shadow: var(--shadow); scroll-margin-top: 16px;
  }
  .panel-head {
    display: flex; align-items: baseline; gap: 14px;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--line-soft);
  }
  .panel-head .badge {
    font-size: 10.5px; color: var(--ink-5); background: var(--panel-tint);
    padding: 3px 7px; border-radius: 4px; font-variant-numeric: tabular-nums;
    font-weight: 600; letter-spacing: 0.04em;
  }
  .panel-head h2 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.01em; flex: 1; }
  .panel-head .head-meta { font-size: 11.5px; color: var(--ink-4); }
  .panel-sub { color: var(--ink-3); margin: 0 0 20px; font-size: 13.5px; max-width: 760px; }

  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 1100px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel-soft); border: 1px solid var(--line-soft);
    border-radius: 8px; padding: 16px 18px;
  }
  .card h4 { font-size: 14px; font-weight: 600; margin: 0 0 8px; color: var(--ink); letter-spacing: -0.005em; }
  .card .lbl { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-5); margin-bottom: 4px; font-weight: 600; }
  .card ul { margin: 0; padding-left: 16px; color: var(--ink-2); }
  .card ul li { margin-bottom: 4px; font-size: 12.5px; line-height: 1.5; }
  .card p { margin: 0 0 8px; font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
  .card p:last-child { margin-bottom: 0; }

  table.matrix { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.matrix th, table.matrix td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  table.matrix th { font-size: 10.5px; color: var(--ink-5); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; border-bottom: 1px solid var(--line); }
  table.matrix tr:last-child td { border-bottom: 0; }
  table.matrix td.num { font-variant-numeric: tabular-nums; text-align: right; }
  table.matrix td b { color: var(--ink); font-weight: 600; }

  .dots { display: inline-flex; gap: 3px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); }
  .dot.on { background: var(--ink-2); }

  .principle-row { display: grid; grid-template-columns: 32px 1fr; gap: 12px; padding: 12px 0; border-top: 1px solid var(--line-soft); }
  .principle-row:first-child { border-top: 0; padding-top: 0; }
  .principle-row .num { font-size: 18px; font-weight: 600; color: var(--ink-5); font-variant-numeric: tabular-nums; line-height: 1; padding-top: 2px; }
  .principle-row .title { font-size: 14px; font-weight: 600; color: var(--ink); margin: 0 0 4px; letter-spacing: -0.005em; }
  .principle-row .desc { font-size: 12.5px; color: var(--ink-3); margin: 0; }

  .legend { display: flex; gap: 16px; margin-top: 12px; font-size: 11px; color: var(--ink-4); }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }

  ol.steps { padding-left: 0; margin: 0; counter-reset: step; list-style: none; }
  ol.steps li {
    counter-increment: step;
    padding: 12px 0 12px 44px;
    border-top: 1px solid var(--line-soft);
    position: relative;
    font-size: 13px; color: var(--ink-2);
  }
  ol.steps li:first-child { border-top: 0; padding-top: 0; }
  ol.steps li::before {
    content: counter(step, decimal-leading-zero);
    position: absolute; left: 0; top: 12px;
    font-size: 11px; color: var(--ink-5); font-weight: 600;
    font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
  }
  ol.steps li:first-child::before { top: 0; }
  ol.steps li b { color: var(--ink); font-weight: 600; }

  .split { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  @media (max-width: 880px) { .split { grid-template-columns: 1fr; } }
  .split-card { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 18px; }
  .split-card .pct { font-size: 28px; font-weight: 600; color: var(--ink); line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-bottom: 4px; }
  .split-card .lbl { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-5); margin-bottom: 12px; font-weight: 600; }
  .split-card p { margin: 0; font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }

  .questions-list { list-style: none; padding: 0; margin: 0; counter-reset: q; }
  .questions-list li {
    counter-increment: q;
    padding: 14px 0 14px 36px;
    border-top: 1px solid var(--line-soft);
    position: relative;
    font-size: 13.5px; color: var(--ink-2);
  }
  .questions-list li:first-child { border-top: 0; padding-top: 0; }
  .questions-list li::before {
    content: "Q" counter(q);
    position: absolute; left: 0; top: 14px;
    font-size: 11px; color: var(--ink-5); font-weight: 600;
    letter-spacing: 0.06em;
  }
  .questions-list li:first-child::before { top: 0; }

  footer.foot {
    margin-top: 40px; padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 11.5px; color: var(--ink-5);
    display: flex; justify-content: space-between;
  }

  code.inline { font-family: "SF Mono", Menlo, monospace; font-size: 12px; background: var(--panel-tint); padding: 1px 6px; border-radius: 3px; color: var(--ink-2); }

  .group-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin: 32px 0 8px; padding-left: 4px; }
  .group-label:first-of-type { margin-top: 0; }


/* Gate-specific styles */
body.locked .layout { filter: blur(20px); pointer-events: none; }
#gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(245,245,247,0.96); backdrop-filter: blur(10px); z-index: 100; }
#gate-card { width: 340px; padding: 30px 28px; background: #fff;
  border: 1px solid #e5e5ea; border-radius: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04); }
#gate-card .eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: #a1a1a6; font-weight: 600; margin: 0 0 4px; }
#gate-card h2 { margin: 0 0 4px; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
#gate-card p { margin: 0 0 18px; font-size: 12.5px; color: #6e6e73; }
#gate-form { display: flex; gap: 8px; }
#gate-input { flex: 1; padding: 9px 12px; border: 1px solid #e5e5ea; border-radius: 6px;
  font-size: 14px; font-family: inherit; outline: none; }
#gate-input:focus { border-color: #1d1d1f; }
#gate-btn { padding: 9px 16px; background: #1d1d1f; color: #fff; border: 0; border-radius: 6px;
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
#gate-err { color: #b91c1c; font-size: 12px; margin-top: 10px; min-height: 14px; }
.lock-link { color: #a1a1a6; font-size: 11px; text-decoration: none; }
.lock-link:hover { color: #1d1d1f; }
</style>
</head>
<body class="locked">

<div id="gate">
  <div id="gate-card">
    <p class="eyebrow">Booster · Research</p>
    <h2>Posting Schedule</h2>
    <p>Internal</p>
    <form id="gate-form" onsubmit="return gateSubmit(event)">
      <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
      <button id="gate-btn" type="submit">Enter</button>
    </form>
    <div id="gate-err"></div>
  </div>
</div>

<div id="content" hidden></div>

<script>
function b64ToBytes(b64) { const bin = atob(b64); const u = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) u[i] = bin.charCodeAt(i); return u; }
async function deriveKey(p, s, it) { const enc = new TextEncoder(); const bk = await crypto.subtle.importKey("raw", enc.encode(p), "PBKDF2", false, ["deriveKey"]); return crypto.subtle.deriveKey({ name: "PBKDF2", salt: s, iterations: it, hash: "SHA-256" }, bk, { name: "AES-GCM", length: 256 }, false, ["decrypt"]); }
async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt); const iv = b64ToBytes(blob.iv); const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}
function runEmbeddedScripts(container) {
  // Find inline <script> tags inside the decrypted content and re-execute them
  // because innerHTML doesn't run <script> automatically.
  container.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    if (old.src) s.src = old.src; else s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}
async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input'); const err = document.getElementById('gate-err'); err.textContent = '';
  try {
    const inner = await decryptPayload(inp.value);
    const c = document.getElementById('content');
    c.innerHTML = inner + '<div style="text-align:center;margin:32px 0 12px;font-size:11px;"><a class="lock-link" href="#" onclick="localStorage.removeItem(\'posting_schedule_pw\');location.reload();return false;">lock device</a></div>';
    c.hidden = false;
    document.getElementById('gate').style.display = 'none';
    document.body.classList.remove('locked');
    try { localStorage.setItem('posting_schedule_pw', inp.value); } catch (_) {}
    runEmbeddedScripts(c);
  } catch (ex) { err.textContent = 'wrong password'; inp.value = ''; inp.focus(); }
  return false;
}
(async () => {
  try {
    const cached = localStorage.getItem('posting_schedule_pw');
    if (cached) {
      const inner = await decryptPayload(cached);
      const c = document.getElementById('content');
      c.innerHTML = inner + '<div style="text-align:center;margin:32px 0 12px;font-size:11px;"><a class="lock-link" href="#" onclick="localStorage.removeItem(\'posting_schedule_pw\');location.reload();return false;">lock device</a></div>';
      c.hidden = false;
      document.getElementById('gate').style.display = 'none';
      document.body.classList.remove('locked');
      runEmbeddedScripts(c);
    }
  } catch (_) { try { localStorage.removeItem('posting_schedule_pw'); } catch (_) {} }
})();
</script>
