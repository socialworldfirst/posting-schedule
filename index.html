<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>WF publishing</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />


<style>
  :root {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --panel-soft: #fafafb;
    --panel-tint: #f0f0f3;
    --ink: #1d1d1f;
    --ink-2: #424245;
    --ink-3: #6e6e73;
    --ink-4: #86868b;
    --ink-5: #a1a1a6;
    --line: #e5e5ea;
    --line-soft: #ececef;
    --line-strong: #d2d2d7;
    --pink: #E6185F;
    --lex: #B7950B;
    --canton: #E67E22;
    --tay: #7D3C98;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  ::selection { background: #ffe066; }

  header.topbar {
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 22px 32px 18px; position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  header.topbar h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 6px; }
  header.topbar p.lede { font-size: 13px; color: var(--ink-3); margin: 0; max-width: 760px; }
  header.topbar .pills { display: flex; gap: 10px; margin-top: 12px; font-size: 11px; color: var(--ink-3); flex-wrap: wrap; }
  header.topbar .pill { background: var(--panel-tint); padding: 3px 9px; border-radius: 4px; border: 1px solid var(--line-soft); }
  header.topbar .pill b { color: var(--ink); font-weight: 600; }

  main { padding: 24px 32px 80px; max-width: 1280px; }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 16px; }
  .hdr { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-4); font-weight: 600; text-align: left; padding: 6px 4px 8px; }
  .day {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px; min-height: 160px;
    transition: border-color .12s ease;
  }
  .day.past { opacity: 0.45; background: var(--panel-soft); }
  .day.today { border: 2px solid var(--pink); }
  .day.sun { background: repeating-linear-gradient(45deg, #fafafb, #fafafb 6px, #f3f3f5 6px, #f3f3f5 12px); }
  .day .date { font-size: 11px; color: var(--ink-4); font-weight: 600; margin-bottom: 8px; font-variant-numeric: tabular-nums; }
  .day.today .date { color: var(--pink); }
  .day .skip { font-size: 10px; color: var(--ink-5); text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 0; }

  .piece {
    background: var(--panel-soft); border: 1px solid var(--line-soft); border-left: 3px solid;
    border-radius: 5px; padding: 8px 10px; margin-bottom: 6px;
    cursor: pointer; font-size: 12px; line-height: 1.35;
    transition: background .1s ease, border-color .1s ease;
  }
  .piece:hover { background: var(--panel); border-color: var(--line-strong); }
  .piece.lex { border-left-color: var(--lex); }
  .piece.canton { border-left-color: var(--canton); }
  .piece.tay { border-left-color: var(--tay); }
  .piece .time { font-size: 9.5px; color: var(--ink-5); font-variant-numeric: tabular-nums; margin-bottom: 1px; }
  .piece .tag { font-size: 9px; color: var(--ink-4); font-weight: 600; margin-left: 4px; }

  .legend { display: flex; gap: 16px; margin-top: 14px; font-size: 11.5px; color: var(--ink-3); flex-wrap: wrap; }
  .legend > span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.lex { background: var(--lex); }
  .dot.canton { background: var(--canton); }
  .dot.tay { background: var(--tay); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(29, 29, 31, 0.55); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 28px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel); border-radius: 14px; max-width: 920px; width: 100%;
    max-height: 92vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-head {
    padding: 22px 28px 18px; border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    position: sticky; top: 0; background: var(--panel); z-index: 2;
  }
  .modal-head h2 { font-size: 19px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .modal-head .sub { font-size: 12.5px; color: var(--ink-3); }
  .modal-head .sub strong { color: var(--ink-2); font-weight: 600; }
  .modal-head .close {
    background: var(--panel-tint); border: 0; font-size: 18px; cursor: pointer; color: var(--ink-3);
    width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0; transition: background .1s ease;
  }
  .modal-head .close:hover { background: var(--line); color: var(--ink); }

  .modal-body { padding: 22px 28px 28px; }

  .thesis {
    background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 7px;
    padding: 12px 14px; margin-bottom: 22px; font-size: 13px; color: var(--ink-2); line-height: 1.55;
  }
  .thesis .lbl { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-5); font-weight: 600; margin-bottom: 4px; }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-4); font-weight: 600;
    margin: 22px 0 10px; display: flex; align-items: baseline; gap: 8px;
  }
  .section-title .count { color: var(--ink-5); font-weight: 500; }
  .section-title .hint { color: var(--ink-5); font-weight: 400; font-size: 10.5px; text-transform: none; letter-spacing: 0; margin-left: auto; }

  .opt {
    background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 7px;
    padding: 12px 14px; margin-bottom: 8px;
    display: grid; grid-template-columns: 28px 1fr 70px; gap: 12px; align-items: start;
    transition: border-color .1s ease;
  }
  .opt:hover { border-color: var(--line-strong); }
  .opt.top { border-color: var(--ink-3); }
  .opt .rank { font-size: 12px; color: var(--ink-4); font-weight: 600; font-variant-numeric: tabular-nums; padding-top: 2px; }
  .opt.top .rank { color: var(--ink); }
  .opt .body { font-size: 13px; color: var(--ink-2); line-height: 1.55; }
  .opt .body .angle {
    display: inline-block; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
    color: var(--ink-5); background: var(--panel); border: 1px solid var(--line-soft); padding: 2px 7px;
    border-radius: 3px; margin-right: 8px; vertical-align: middle;
  }
  .opt.top .body .angle { color: var(--ink-3); border-color: var(--line); }
  .opt .body .text { color: var(--ink); font-weight: 500; }
  .opt.top .body .text { font-weight: 600; }
  .opt.caption .body .body-text { white-space: pre-wrap; font-weight: 400; color: var(--ink-2); margin-top: 6px; font-size: 12.5px; line-height: 1.55; }

  button.copy {
    background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 5px 9px;
    font-size: 11px; color: var(--ink-2); cursor: pointer; font-weight: 500;
    transition: background .1s ease, border-color .1s ease;
    align-self: start;
  }
  button.copy:hover { background: var(--panel-tint); border-color: var(--line-strong); }
  button.copy.done { background: #e8f5e9; border-color: #c8e6c9; color: #1b5e20; }

  .hashtags {
    background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 7px;
    padding: 12px 14px; margin-bottom: 8px;
    display: grid; grid-template-columns: 1fr 70px; gap: 12px; align-items: center;
    font-family: ui-monospace, "SF Mono", monospace; font-size: 12.5px; color: var(--ink-2);
  }

  .yt-link {
    background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 7px;
    padding: 10px 14px; font-size: 12px; color: var(--ink-3); margin-bottom: 14px;
    display: grid; grid-template-columns: 1fr 70px; gap: 12px; align-items: center;
  }
  .yt-link b { color: var(--ink-2); font-weight: 600; }
  .yt-link code { background: var(--panel); border: 1px solid var(--line-soft); padding: 2px 7px; border-radius: 4px; color: var(--ink); font-family: ui-monospace, monospace; font-size: 11.5px; }

  .mark-posted {
    margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line-soft);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .mark-posted button {
    background: var(--ink); color: white; border: 0; padding: 9px 16px;
    border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background .1s ease;
  }
  .mark-posted button:hover { background: #000; }
  .mark-posted .help { font-size: 11.5px; color: var(--ink-4); }
  .mark-posted code { font-family: ui-monospace, monospace; font-size: 11px; background: var(--panel-tint); padding: 1px 5px; border-radius: 3px; color: var(--ink-3); }

  footer { padding: 32px 32px 24px; color: var(--ink-4); font-size: 11.5px; border-top: 1px solid var(--line); }
</style>
<style>
  body.locked #content { display: none; }
  #gate {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #f5f5f7; z-index: 9999;
  }
  #gate-card {
    background: #fff; border: 1px solid #e5e5ea; border-radius: 14px;
    padding: 32px 36px; max-width: 360px; width: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
  }
  #gate-card h2 {
    font-size: 17px; font-weight: 600; margin: 0 0 6px; color: #1d1d1f; letter-spacing: -0.01em;
  }
  #gate-card p {
    font-size: 12.5px; color: #6e6e73; margin: 0 0 18px;
  }
  #gate-form { display: flex; gap: 8px; }
  #gate-input {
    flex: 1; font-size: 14px; padding: 9px 12px;
    border: 1px solid #d2d2d7; border-radius: 7px; outline: none;
    font-family: inherit; color: #1d1d1f;
  }
  #gate-input:focus { border-color: #1d1d1f; }
  #gate-btn {
    background: #1d1d1f; color: #fff; border: 0; border-radius: 7px;
    padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit;
  }
  #gate-btn:hover { background: #000; }
  #gate-err {
    font-size: 12px; color: #b00020; margin-top: 10px; min-height: 16px;
  }
  body.locked > *:not(#gate):not(script) { filter: blur(20px); pointer-events: none; }
  #lock-link {
    position: fixed; bottom: 12px; right: 16px; font-size: 11px; color: #86868b;
    text-decoration: none; font-family: -apple-system, sans-serif; z-index: 50;
  }
  #lock-link:hover { color: #1d1d1f; }
</style>
</head>
<body class="locked">

<div id="gate">
  <div id="gate-card">
    <h2>WF publishing</h2>
    <p>Internal access only.</p>
    <form id="gate-form" onsubmit="return gateSubmit(event)">
      <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
      <button id="gate-btn" type="submit">Enter</button>
    </form>
    <div id="gate-err"></div>
  </div>
</div>

<div id="content" hidden></div>

<script>
function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
}
async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt);
  const iv = b64ToBytes(blob.iv);
  const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}
function executeScriptsIn(container) {
  // Re-create script tags so they actually execute (innerHTML script tags don't run)
  const scripts = Array.from(container.querySelectorAll("script"));
  for (const old of scripts) {
    const fresh = document.createElement("script");
    if (old.type) fresh.type = old.type;
    if (old.src) fresh.src = old.src;
    fresh.textContent = old.textContent;
    old.parentNode.replaceChild(fresh, old);
  }
}
async function unlock(password) {
  const innerHtml = await decryptPayload(password);
  const c = document.getElementById('content');
  c.innerHTML = innerHtml;
  c.hidden = false;
  document.getElementById('gate').style.display = 'none';
  document.body.classList.remove('locked');
  document.getElementById('lock-link').style.display = 'inline';
  executeScriptsIn(c);
}
async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input');
  const err = document.getElementById('gate-err');
  err.textContent = '';
  try {
    await unlock(inp.value);
    try { localStorage.setItem('wf_publishing_pw', inp.value); } catch (_) {}
  } catch (ex) {
    err.textContent = 'wrong password';
    inp.value = '';
    inp.focus();
  }
  return false;
}
// Auto-unlock on future visits
(async () => {
  try {
    const cached = localStorage.getItem('wf_publishing_pw');
    if (cached) await unlock(cached);
  } catch (_) {
    try { localStorage.removeItem('wf_publishing_pw'); } catch (_) {}
  }
})();
</script>
